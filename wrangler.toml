name = "ubani-hosting-api"
main = "src/worker.js"
compatibility_date = "2026-03-06"
workers_dev = true
routes = [
  { pattern = "api.ubanihosting.co.za/*", zone_name = "ubanihosting.co.za" },
  { pattern = "ubanihosting.co.za/*",     zone_name = "ubanihosting.co.za" },
  { pattern = "www.ubanihosting.co.za/*", zone_name = "ubanihosting.co.za" }
]

[vars]
PUBLIC_API_BASE_URL = "https://api.ubanihosting.co.za"

[observability]
enabled = true

[assets]
directory = "./public"
binding   = "ASSETS"

# ── R2 bucket for file uploads ─────────────────
# Create the bucket first:  npx wrangler r2 bucket create ubani-files
[[r2_buckets]]
binding    = "FILES_BUCKET"
bucket_name = "ubani-files"
preview_bucket_name = "ubani-files-dev"   # npx wrangler r2 bucket create ubani-files-dev